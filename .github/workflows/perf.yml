name: perf

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

# Backend tier: no Lighthouse. Two checks:
#   1. Lambda zip size cap (5 MB per function — gated by .perf-budgets.json).
#   2. Cold-start p95 ≤700 ms — enforced by ttfb.yml synthetic cron.
# Packaging runs without AWS credentials (no deploy). serverless-domain-manager
# does its work at deploy time, not package time, so DOMAIN_ROUTE53_HOSTED_ZONE_ID
# is not required here.

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Package Lambdas (no deploy)
        run: npx serverless package --stage prod
        env:
          # Dummy credentials — `package` doesn't call AWS but config validation
          # may complain without them on some serverless versions.
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

      - name: Lambda zip size budget
        run: node scripts/check-bundle-size.mjs
