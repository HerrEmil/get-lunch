service: enhanced-lunch-table

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-north-1
  stage: ${opt:stage, 'dev'}
  environment:
    LUNCH_CACHE_TABLE: ${self:custom.tableName}
    CACHE_TTL_DAYS: 14
    STAGE: ${self:provider.stage}
    LOG_GROUP_NAME: /aws/lambda/${self:service}-${self:provider.stage}
    SERVICE_NAME: ${self:service}
    LOG_LEVEL: ${opt:log-level, 'INFO'}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
  apiGateway:
    minimumCompressionSize: 1024
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
            - dynamodb:UpdateItem
          Resource:
            - Fn::GetAtt: [LunchCacheTable, Arn]
            - Fn::Join:
                - ""
                - - Fn::GetAtt: [LunchCacheTable, Arn]
                  - "/index/*"
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            - logs:DescribeLogGroups
            - logs:DescribeLogStreams
          Resource: "arn:aws:logs:${self:provider.region}:*:*"
        - Effect: Allow
          Action:
            - events:PutRule
            - events:DeleteRule
            - events:PutTargets
            - events:RemoveTargets
          Resource: "*"

functions:
  # Data Collection Lambda (weekly scheduled).
  # jsdom + pdfjs-dist are kept external to the bundle and shipped via
  # node_modules patterns below (lazy-imported at parser call sites).
  dataCollector:
    handler: dist/data-collector/index.handler
    timeout: 300
    memorySize: 1024
    package:
      patterns:
        - '!**'
        - dist/data-collector/**
        - node_modules/jsdom/**
        - node_modules/pdfjs-dist/legacy/build/pdf.mjs
        - node_modules/pdfjs-dist/legacy/build/pdf.worker.mjs
        - node_modules/pdfjs-dist/package.json
        # jsdom transitive deps (resolved by Node at runtime)
        - node_modules/cssstyle/**
        - node_modules/data-urls/**
        - node_modules/decimal.js/**
        - node_modules/entities/**
        - node_modules/html-encoding-sniffer/**
        - node_modules/http-proxy-agent/**
        - node_modules/https-proxy-agent/**
        - node_modules/is-potential-custom-element-name/**
        - node_modules/nwsapi/**
        - node_modules/parse5/**
        - node_modules/rrweb-cssom/**
        - node_modules/saxes/**
        - node_modules/symbol-tree/**
        - node_modules/tough-cookie/**
        - node_modules/tr46/**
        - node_modules/w3c-xmlserializer/**
        - node_modules/webidl-conversions/**
        - node_modules/whatwg-encoding/**
        - node_modules/whatwg-mimetype/**
        - node_modules/whatwg-url/**
        - node_modules/ws/**
        - node_modules/xml-name-validator/**
        - node_modules/punycode/**
        - node_modules/iconv-lite/**
        - node_modules/safer-buffer/**
        - node_modules/agent-base/**
        - node_modules/debug/**
        - node_modules/ms/**
        - node_modules/css-tree/**
        - node_modules/mdn-data/**
        - node_modules/source-map-js/**
        - node_modules/undici/**
        - node_modules/@asamuzakjp/**
        - node_modules/@csstools/**
        - node_modules/@exodus/**
        - node_modules/tldts/**
        - node_modules/tldts-core/**
        - node_modules/bidi-js/**
        - node_modules/require-from-string/**
        - node_modules/lru-cache/**
        # Excludes (last patterns win) — strip metadata, sourcemaps, type defs.
        - '!**/*.md'
        - '!**/*.markdown'
        - '!**/*.map'
        - '!**/*.ts'
        - '!**/*.d.ts'
        - '!**/*.d.mts'
        - '!**/*.flow'
        - '!**/LICENSE'
        - '!**/LICENSE.txt'
        - '!**/LICENSE.md'
        - '!**/CHANGELOG.md'
        - '!**/CHANGELOG'
        - '!**/test/**'
        - '!**/tests/**'
        - '!**/__tests__/**'
        - '!**/types/**'
        - '!**/.github/**'
        - '!**/example/**'
        - '!**/examples/**'
        - '!**/docs/**'
        # pdfjs-dist heavy directories we don't use
        - '!node_modules/pdfjs-dist/build/**'
        - '!node_modules/pdfjs-dist/web/**'
        - '!node_modules/pdfjs-dist/legacy/web/**'
        - '!node_modules/pdfjs-dist/legacy/image_decoders/**'
        - '!node_modules/pdfjs-dist/image_decoders/**'
        - '!node_modules/pdfjs-dist/cmaps/**'
        - '!node_modules/pdfjs-dist/standard_fonts/**'
        - '!node_modules/pdfjs-dist/wasm/**'
        - '!node_modules/pdfjs-dist/iccs/**'
        - '!node_modules/pdfjs-dist/legacy/build/pdf.sandbox*'
        - '!node_modules/pdfjs-dist/legacy/build/pdf.min.mjs'
        - '!node_modules/pdfjs-dist/legacy/build/pdf.worker.min.mjs'
        # tldts ships ESM/UMD/CJS minified variants — keep CJS only
        - '!node_modules/tldts/dist/index.esm*'
        - '!node_modules/tldts/dist/index.umd*'
        - '!node_modules/tldts/dist/es6/**'
    events:
      - schedule:
          rate: cron(0 8 ? * MON-FRI *)
          description: "Daily lunch data collection from restaurants"
          enabled: true

  # HTML Serving Lambda (API Gateway).
  # Note: Lambda SnapStart is not supported for Node.js runtimes (only Java/Python/.NET).
  # Cold-start mitigation here relies on AWS_NODEJS_CONNECTION_REUSE_ENABLED + small
  # bundle (ESM tree-shake, externalized heavy deps) + API Gateway response caching.
  apiServer:
    handler: dist/api-server/index.handler
    timeout: 30
    memorySize: 512
    package:
      patterns:
        - '!**'
        - dist/api-server/**
    events:
      - http:
          path: /
          method: get
          cors: true
          caching:
            enabled: true
            ttlInSeconds: 300
      - http:
          path: /lunch
          method: get
          cors: true
          caching:
            enabled: true
            ttlInSeconds: 300
      - http:
          path: /lunch/{day}
          method: get
          cors: true
          caching:
            enabled: true
            ttlInSeconds: 300
            cacheKeyParameters:
              - name: request.path.day

resources:
  Resources:
    # DynamoDB Table for Lunch Cache
    LunchCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: restaurant
            AttributeType: S
          - AttributeName: cachedAt
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: RestaurantIndex
            KeySchema:
              - AttributeName: restaurant
                KeyType: HASH
              - AttributeName: cachedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
          SSEType: KMS
        Tags:
          - Key: Project
            Value: EnhancedLunchTable
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Purpose
            Value: LunchDataCache

    # Main Application Log Group
    EnhancedLunchTableLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}
        RetentionInDays: 14
        Tags:
          - Key: Project
            Value: EnhancedLunchTable
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Component
            Value: Application

    # Data Collector Lambda Log Group
    DataCollectorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-dataCollector
        RetentionInDays: 30
        Tags:
          - Key: Project
            Value: EnhancedLunchTable
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Component
            Value: DataCollector

    # API Server Lambda Log Group
    ApiServerLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-apiServer
        RetentionInDays: 14
        Tags:
          - Key: Project
            Value: EnhancedLunchTable
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Component
            Value: ApiServer

  Outputs:
    # Table Information
    LunchCacheTableName:
      Description: "DynamoDB table name for lunch cache"
      Value: ${self:custom.tableName}
      Export:
        Name: ${self:service}-${self:provider.stage}-lunch-cache-table

    LunchCacheTableArn:
      Description: "DynamoDB table ARN for lunch cache"
      Value: ${self:custom.tableArn}
      Export:
        Name: ${self:service}-${self:provider.stage}-lunch-cache-table-arn

    # API Information
    ApiGatewayUrl:
      Description: "API Gateway URL for lunch service"
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api."
            - ${self:provider.region}
            - ".amazonaws.com/"
            - ${self:provider.stage}
      Export:
        Name: ${self:service}-${self:provider.stage}-api-url

    # CloudWatch Log Groups
    LogGroupName:
      Description: "Main application log group name"
      Value: !Ref EnhancedLunchTableLogGroup
      Export:
        Name: ${self:service}-${self:provider.stage}-log-group

    DataCollectorLogGroupName:
      Description: "Data collector log group name"
      Value: !Ref DataCollectorLogGroup
      Export:
        Name: ${self:service}-${self:provider.stage}-data-collector-log-group

plugins:
  - serverless-domain-manager
  - serverless-offline
  - serverless-dynamodb
  - serverless-api-gateway-caching

package:
  individually: true
  patterns:
    # Global excludes applied to every function package.
    - '!**/*.md'
    - '!**/*.markdown'
    - '!**/*.map'
    - '!**/*.ts'
    - '!**/*.d.ts'
    - '!**/*.d.mts'
    - '!**/LICENSE'
    - '!**/LICENSE.txt'
    - '!**/LICENSE.md'
    - '!**/CHANGELOG.md'
    - '!**/CHANGELOG'
    - '!**/test/**'
    - '!**/tests/**'
    - '!**/__tests__/**'
    - '!**/types/**'
    - '!**/.github/**'
    - '!**/example/**'
    - '!**/examples/**'

# Environment-specific configurations
configValidationMode: error

# Local development configuration
custom:
  tableName: ${self:service}-lunch-cache-${self:provider.stage}
  tableArn:
    Fn::GetAtt:
      - LunchCacheTable
      - Arn
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    printOutput: true

  customDomain:
    domainName: lunch.herremil.com
    basePath: ''
    stage: ${self:provider.stage}
    certificateName: lunch.herremil.com
    createRoute53Record: false
    endpointType: regional
    securityPolicy: tls_1_2

  serverless-dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      convertEmptyValues: true

  # API Gateway response caching (cluster only enabled in prod).
  # Cluster size 0.5 GB is the minimum and cheapest tier.
  apiGatewayCaching:
    enabled: ${self:custom.apiGatewayCachingEnabled.${self:provider.stage}, false}
    clusterSize: '0.5'
    ttlInSeconds: 300

  apiGatewayCachingEnabled:
    prod: true
    dev: false

