name: Setup Custom Domain

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-1
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - run: yarn install --frozen-lockfile || yarn install
      - name: Downgrade serverless-domain-manager to v7 (compatible with SLS v3)
        run: yarn add --dev serverless-domain-manager@7

      - name: Debug serverless config
        run: |
          cat serverless.yml | grep -A5 plugins
          npx serverless doctor 2>&1 || true
          node -e "try { require('serverless-domain-manager'); console.log('require OK') } catch(e) { console.log('require FAIL:', e.message) }"
          npx serverless help 2>&1 | head -40

      - name: Create custom domain
        run: npx serverless create_domain --stage prod

      - name: Deploy
        run: npx serverless deploy --stage prod

      - name: Summary
        run: |
          echo "### ✅ Domain setup complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://lunch.herremil.com" >> $GITHUB_STEP_SUMMARY
