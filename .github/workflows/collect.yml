name: Collect

# Manually trigger the data-collector Lambda (e.g. to refresh DynamoDB after
# a parser fix lands, instead of waiting for the weekday 08:00 UTC cron).
on:
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Invoke data collector
        run: |
          aws lambda invoke \
            --function-name enhanced-lunch-table-prod-dataCollector \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 360 \
            --payload '{}' \
            out.json
          cat out.json
          python3 -c "import json; body=json.load(open('out.json')); exit(0 if body.get('statusCode')==200 else 1)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
