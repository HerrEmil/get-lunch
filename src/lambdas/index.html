<!doctype html>
<html>
    <head>
        <link
            rel="stylesheet"
            href="https://uicdn.toast.com/grid/latest/tui-grid.css"
        />
        <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
    </head>
    <body>
        <div id="filters" style="padding:8px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;"></div>
        <div id="grid"></div>
    </body>
    <script>
        const lunches = [];
        const allData = [...lunches];

        const today = new Intl.DateTimeFormat("sv-SE", {
            weekday: "long",
        }).format(Date.now());

        let activeDay = today;
        let searchName = "";
        let searchDesc = "";

        // Build filter controls
        const filtersEl = document.getElementById("filters");

        // Day dropdown
        const dayLabel = document.createElement("label");
        dayLabel.textContent = "Dag: ";
        const daySelect = document.createElement("select");
        daySelect.style.padding = "4px 8px";
        const days = ["alla", "måndag", "tisdag", "onsdag", "torsdag", "fredag"];
        days.forEach(d => {
            const opt = document.createElement("option");
            opt.value = d === "alla" ? "" : d;
            opt.textContent = d.charAt(0).toUpperCase() + d.slice(1);
            if (d === today) opt.selected = true;
            daySelect.appendChild(opt);
        });
        daySelect.addEventListener("change", () => {
            activeDay = daySelect.value;
            filterData();
        });
        dayLabel.appendChild(daySelect);
        filtersEl.appendChild(dayLabel);

        // Search inputs
        [["Lunch", "name"], ["Beskrivning", "description"]].forEach(([label, field]) => {
            const wrap = document.createElement("label");
            wrap.textContent = label + ": ";
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Sök...";
            input.style.padding = "4px 8px";
            input.addEventListener("input", () => {
                if (field === "name") searchName = input.value.toLowerCase();
                else searchDesc = input.value.toLowerCase();
                filterData();
            });
            wrap.appendChild(input);
            filtersEl.appendChild(wrap);
        });

        function filterData() {
            const filtered = allData.filter(l => {
                if (activeDay && l.weekday !== activeDay) return false;
                if (searchName && !String(l.name || "").toLowerCase().includes(searchName)) return false;
                if (searchDesc && !String(l.description || "").toLowerCase().includes(searchDesc)) return false;
                return true;
            });
            lunchTable.resetData(filtered);
        }

        const columnOption = {
            sortable: true,
            align: "center",
            resizable: true,
            width: 80,
        };

        const Grid = tui.Grid;
        const lunchTable = new Grid({
            el: document.getElementById("grid"),
            columns: [
                {
                    ...columnOption,
                    header: "Vecka",
                    name: "week",
                },
                {
                    ...columnOption,
                    header: "Dag",
                    name: "weekday",
                    width: 120,
                },
                {
                    ...columnOption,
                    header: "Plats",
                    name: "place",
                    filter: "select",
                    renderer: {
                        type: class {
                            constructor(props) {
                                const el = document.createElement("a");
                                this.el = el;
                                this.render(props);
                            }
                            getElement() { return this.el; }
                            render(props) {
                                const url = props.grid.getValue(props.rowKey, "placeUrl");
                                this.el.textContent = props.value || "";
                                if (url) {
                                    this.el.href = url;
                                    this.el.target = "_blank";
                                    this.el.rel = "noopener";
                                } else {
                                    this.el.removeAttribute("href");
                                }
                            }
                        },
                    },
                },
                {
                    ...columnOption,
                    header: "Lunch",
                    name: "name",
                    width: 200,
                },
                {
                    ...columnOption,
                    header: "Beskrivning",
                    name: "description",
                    width: 300,
                },
                {
                    ...columnOption,
                    header: "Pris",
                    name: "price",
                },
            ],
            data: lunches,
            usageStatistics: false,
        });
        Grid.applyTheme("striped");

        filterData();
    </script>
</html>
