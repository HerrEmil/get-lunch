# One-off: turn off the API Gateway cache cluster on the prod stage.
# The serverless-api-gateway-caching plugin enabled it via update-stage
# (outside CloudFormation), so removing the plugin (8aa7adc) never
# disabled it and the 0.5GB cluster kept billing hourly.
name: Disable API Gateway cache

on:
  workflow_dispatch:

jobs:
  disable-cache:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1
    steps:
      - name: Disable cache cluster on prod stage
        run: |
          set -euo pipefail
          API_ID=$(aws apigateway get-rest-apis \
            --query "items[?name=='prod-enhanced-lunch-table'].id" --output text)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "REST API 'prod-enhanced-lunch-table' not found. Available APIs:"
            aws apigateway get-rest-apis --query "items[].{id:id,name:name}" --output table
            exit 1
          fi
          echo "Found REST API: $API_ID"
          aws apigateway update-stage --rest-api-id "$API_ID" --stage-name prod \
            --patch-operations op=replace,path=/cacheClusterEnabled,value=false
          echo "Stage after patch:"
          aws apigateway get-stage --rest-api-id "$API_ID" --stage-name prod \
            --query "{cacheClusterEnabled:cacheClusterEnabled,cacheClusterStatus:cacheClusterStatus}"
