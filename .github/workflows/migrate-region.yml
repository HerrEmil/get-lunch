name: Migrate to eu-north-1

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - "1-cert-and-deploy"
          - "2-cleanup-eu-west-1"

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DOMAIN: lunch.herremil.com
  NEW_REGION: eu-north-1
  OLD_REGION: eu-west-1

jobs:
  cert-and-deploy:
    if: inputs.step == '1-cert-and-deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Request ACM certificate in eu-north-1
        id: cert
        run: |
          # Check if cert already exists
          EXISTING=$(aws acm list-certificates \
            --region $NEW_REGION \
            --query "CertificateSummaryList[?DomainName=='$DOMAIN'].CertificateArn" \
            --output text)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Certificate already exists: $EXISTING"
            echo "cert_arn=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CERT_ARN=$(aws acm request-certificate \
            --domain-name "$DOMAIN" \
            --validation-method DNS \
            --region $NEW_REGION \
            --query CertificateArn \
            --output text)

          echo "cert_arn=$CERT_ARN" >> "$GITHUB_OUTPUT"
          echo "Certificate ARN: $CERT_ARN"

      - name: DNS-validate certificate
        run: |
          echo "Waiting for validation record to populate..."
          sleep 15

          CERT_ARN="${{ steps.cert.outputs.cert_arn }}"

          # Check if already validated
          STATUS=$(aws acm describe-certificate \
            --certificate-arn "$CERT_ARN" \
            --region $NEW_REGION \
            --query 'Certificate.Status' \
            --output text)

          if [ "$STATUS" = "ISSUED" ]; then
            echo "Certificate already issued."
            exit 0
          fi

          VALIDATION=$(aws acm describe-certificate \
            --certificate-arn "$CERT_ARN" \
            --region $NEW_REGION \
            --query 'Certificate.DomainValidationOptions[0].ResourceRecord')

          VAL_NAME=$(echo "$VALIDATION" | jq -r '.Name')
          VAL_VALUE=$(echo "$VALIDATION" | jq -r '.Value')

          ROOT_DOMAIN=$(echo "$DOMAIN" | awk -F. '{print $(NF-1)"."$NF}')
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${ROOT_DOMAIN}." \
            --query 'HostedZones[0].Id' \
            --output text | sed 's|/hostedzone/||')

          echo "Adding validation CNAME: $VAL_NAME -> $VAL_VALUE"
          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"$VAL_NAME\",
                  \"Type\": \"CNAME\",
                  \"TTL\": 300,
                  \"ResourceRecords\": [{\"Value\": \"$VAL_VALUE\"}]
                }
              }]
            }"

          echo "Waiting for certificate validation..."
          aws acm wait certificate-validated \
            --certificate-arn "$CERT_ARN" \
            --region $NEW_REGION

          echo "Certificate issued."

      - name: Build
        run: yarn build

      - name: Create custom domain in eu-north-1
        run: npx serverless create_domain --stage prod || true

      - name: Deploy stack to eu-north-1
        run: npx serverless deploy --stage prod

      - name: Update Route53 to point to new API Gateway
        run: |
          # Get the custom domain's target
          TARGET=$(aws apigateway get-domain-name \
            --domain-name "$DOMAIN" \
            --region $NEW_REGION \
            --query 'regionalDomainName' \
            --output text)

          HOSTED_ZONE_ID=$(aws apigateway get-domain-name \
            --domain-name "$DOMAIN" \
            --region $NEW_REGION \
            --query 'regionalHostedZoneId' \
            --output text)

          echo "API GW target: $TARGET (hosted zone: $HOSTED_ZONE_ID)"

          ROOT_DOMAIN=$(echo "$DOMAIN" | awk -F. '{print $(NF-1)"."$NF}')
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${ROOT_DOMAIN}." \
            --query 'HostedZones[0].Id' \
            --output text | sed 's|/hostedzone/||')

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"$DOMAIN\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"DNSName\": \"$TARGET\",
                    \"HostedZoneId\": \"$HOSTED_ZONE_ID\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }]
            }"

          echo "Route53 updated: $DOMAIN -> $TARGET"

  cleanup:
    if: inputs.step == '2-cleanup-eu-west-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Delete custom domain in eu-west-1
        run: |
          npx serverless delete_domain --stage prod --region $OLD_REGION || true

      - name: Remove old stack from eu-west-1
        run: npx serverless remove --stage prod --region $OLD_REGION

      - name: Delete old ACM certificate in eu-west-1
        run: |
          OLD_CERT=$(aws acm list-certificates \
            --region $OLD_REGION \
            --query "CertificateSummaryList[?DomainName=='$DOMAIN'].CertificateArn" \
            --output text)

          if [ -n "$OLD_CERT" ] && [ "$OLD_CERT" != "None" ]; then
            echo "Deleting old certificate: $OLD_CERT"
            aws acm delete-certificate \
              --certificate-arn "$OLD_CERT" \
              --region $OLD_REGION
          fi
